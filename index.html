<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-KSHAY WEALTH - Premium Calculator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0d6efd; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #0d6efd; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #resultBox { display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>A-KSHAY WEALTH</h1>
    <form id="termForm" onsubmit="calculatePremium(event)">
        <div class="form-group"><input type="text" id="name" required placeholder="પૂરું નામ"></div>
        <div class="form-group"><input type="tel" id="mobile" required placeholder="મોબાઈલ નંબર"></div>
        <div class="form-group"><select id="age"></select></div>
        <div class="form-group"><select id="plan">
            <option value="pure50">Pure Term (50 Lakh)</option>
            <option value="pure1cr">Pure Term (1 Crore)</option>
        </select></div>
        <button type="submit">Calculate Premium</button>
    </form>
    <div id="resultBox">
        <h3>અંદાજિત પ્રીમિયમ: <span id="premiumDisplay"></span></h3>
        <a id="finalBtn" href="#" style="display:block; text-align:center; background:green; color:white; padding:10px; text-decoration:none; border-radius:5px;">WhatsApp પર સંપર્ક કરો</a>
    </div>
</div>
<script>
    // ઉંમર ભરવા માટે
    const ageSelect = document.getElementById('age');
    for(let i=20; i<=60; i++) { ageSelect.innerHTML += `<option value="${i}">${i} વર્ષ</option>`; }

    function calculatePremium(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const mobile = document.getElementById('mobile').value;
        const premium = "₹25,000"; // આ એક ઉદાહરણ છે
        
        document.getElementById('premiumDisplay').innerText = premium;
        document.getElementById('resultBox').style.display = 'block';

        // અહીં તમારી Google Web App URL નાખો
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycby2iwP9FjuWIrXRKSc0T2Mp0JN1uPxYQY9PFBN_pr2ro5RymfWEqKsI8rNaOK0Cl0k/exec"; 
        
        fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, mobile, premium, plan: document.getElementById('plan').value })
        });
        
        document.getElementById('finalBtn').href = "https://wa.me/917383666008?text=Hello, my name is " + name;
    }
</script>
</body>
</html>
